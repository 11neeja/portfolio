<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Neeja Suva Portfolio</title>
  <desc id="desc">Full Stack Developer and AI ML portfolio showcase.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b1f" />
      <stop offset="50%" stop-color="#1a1440" />
      <stop offset="100%" stop-color="#2e1f61" />
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <g opacity="0.2">
    <circle cx="1040" cy="120" r="180" fill="#2dd4bf" />
    <circle cx="180" cy="520" r="220" fill="#c084fc" />
  </g>

  <rect x="84" y="84" width="420" height="110" rx="12" fill="url(#badge)" />
  <text x="114" y="154" fill="#090611" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700">NEEJA SUVA</text>

  <text x="86" y="286" fill="#ffffff" font-family="'Segoe UI', Arial, sans-serif" font-size="70" font-weight="800">Full Stack Developer</text>
  <text x="86" y="362" fill="#d8d5ff" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="500">MERN • AI/ML • Project Case Studies</text>

  <rect x="86" y="430" width="550" height="88" rx="10" fill="#0d0f2c" stroke="#ff6b9d" stroke-width="2" />
  <text x="118" y="488" fill="#fef3c7" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="600">Portfolio by Neeja Suva</text>
</svg>
